{{- if .Values.servicemonitor.enabled }}
kind: ServiceMonitor
apiVersion: monitoring.coreos.com/v1
metadata:
  name: keepup-service
  labels:
    app: keepup
    type: backend
spec:
  endpoints:
    - interval: 60s
      path: /metrics
      port: http
      relabelings:
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: instance
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: pod
  jobLabel: keepup-service
  selector:
    matchLabels:
      app: keepup
      type: backend
---
{{- end -}}
